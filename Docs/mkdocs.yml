site_name: Ui Utils
nav:
  - Home: index.md
  - Installation: installation.md
  - FAQs: faqs.md
  - Methods:
      - Avatar: methods/Avatar.md
      - Toggle: methods/Toggle.md
      - Hover: methods/Hover.md
      - Gradient: methods/Gradient.md
      - PlaceVersion: methods/PlaceVersion.md
      - Username: methods/Username.md
      - PromptPurchase: methods/PromptPurchase.md
      - Leaderstats: methods/Leaderstats.md
  - CustomAttributes:
      - UserId: custom_attributes/UserId.md
  - Presets:
      - NormalButton: presets/NormalButton.md
theme:
  name: material
  icon:
    logo: material/book-open-page-variant
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: blue
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange
extra:
  social:
    - icon: simple/roblox
      link: https://www.roblox.com/users/1964468404/profile
    - icon: simple/robloxstudio
      link: https://devforum.roblox.com/u/clovis500c/summary
    - icon: simple/github
      link: https://github.com/Clovis500c
    - icon: simple/x
      link: https://x.com/clovis500c
plugins:
  - search
  - macros
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html